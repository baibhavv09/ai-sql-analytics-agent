name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: sql_analytics_test
          MYSQL_USER: appuser
          MYSQL_PASSWORD: apppass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -prootpass"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      APP_NAME: AI SQL Analytics Agent
      APP_VERSION: 1.0.0
      APP_ENV: test
      SECRET_KEY: test-secret
      # Test-only Fernet key (base64 of 32 zero bytes) — never reuse outside CI.
      DATABASE_SECRET_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: appuser
      DB_PASSWORD: apppass
      DB_NAME: sql_analytics_test
      DATABASE_URL: mysql+pymysql://appuser:apppass@127.0.0.1:3306/sql_analytics_test
      OPENAI_API_KEY: dummy-key
      OPENAI_MODEL: gpt-4o-mini
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_CACHE_TTL: 600

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 backend --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 backend --count --max-line-length=120 --statistics --exit-zero

      - name: Check formatting with black
        run: black --check backend || true

      - name: Check import order with isort
        run: isort --check-only backend || true

      - name: Smoke import (settings + backend.main)
        run: python -c "from backend.core.config import settings; import backend.main; print('OK', settings.APP_NAME)"

      - name: Run tests
        run: |
          if [ -d tests ] && [ -n "$(find tests -name 'test_*.py' -o -name '*_test.py' 2>/dev/null)" ]; then
            set +e
            pytest -q
            rc=$?
            set -e
            # Exit code 5 = pytest collected no tests (empty placeholder files). Treat as success.
            if [ $rc -eq 5 ]; then
              echo "pytest found no tests to run — treating as success."
              exit 0
            fi
            exit $rc
          else
            echo "No test files found in tests/ — skipping pytest."
          fi
