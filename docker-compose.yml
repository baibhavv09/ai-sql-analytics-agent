services:
  db:
    image: mysql:8.0
    container_name: sql-analytics-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-sql_analytics}
      MYSQL_USER: ${DB_USER:-appuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-apppass}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - sql-analytics-net

  redis:
    image: redis:7-alpine
    container_name: sql-analytics-redis
    restart: unless-stopped
    command: >-
      redis-server
      --appendonly yes
      ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli ${REDIS_PASSWORD:+-a $$REDIS_PASSWORD} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    networks:
      - sql-analytics-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sql-analytics-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME:-AI SQL Analytics Agent}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      APP_ENV: ${APP_ENV:-development}
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_SECRET_KEY: "${DATABASE_SECRET_KEY:?DATABASE_SECRET_KEY must be set - generate with: python -c \"from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())\"}"
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-appuser}
      DB_PASSWORD: ${DB_PASSWORD:-apppass}
      DB_NAME: ${DB_NAME:-sql_analytics}
      DATABASE_URL: mysql+pymysql://${DB_USER:-appuser}:${DB_PASSWORD:-apppass}@db:3306/${DB_NAME:-sql_analytics}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_TEMPERATURE: ${OPENAI_TEMPERATURE:-0.1}
      OPENAI_MAX_TOKENS: ${OPENAI_MAX_TOKENS:-1000}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_CACHE_TTL: ${REDIS_CACHE_TTL:-600}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FILE: ${LOG_FILE:-logs/app.log}
      MAX_QUERY_ROWS: ${MAX_QUERY_ROWS:-1000}
      QUERY_TIMEOUT: ${QUERY_TIMEOUT:-30}
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - app_logs:/app/logs
    networks:
      - sql-analytics-net

volumes:
  mysql_data:
  redis_data:
  app_logs:

networks:
  sql-analytics-net:
    driver: bridge
