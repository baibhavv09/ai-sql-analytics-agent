services:
  db:
    image: mysql:8.0
    container_name: sql-analytics-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-sql_analytics}
      MYSQL_USER: ${DB_USER:-appuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-apppass}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - sql-analytics-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sql-analytics-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME:-AI SQL Analytics Agent}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      APP_ENV: ${APP_ENV:-development}
      SECRET_KEY: ${SECRET_KEY}
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-appuser}
      DB_PASSWORD: ${DB_PASSWORD:-apppass}
      DB_NAME: ${DB_NAME:-sql_analytics}
      DATABASE_URL: mysql+pymysql://${DB_USER:-appuser}:${DB_PASSWORD:-apppass}@db:3306/${DB_NAME:-sql_analytics}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FILE: ${LOG_FILE:-logs/app.log}
      MAX_QUERY_ROWS: ${MAX_QUERY_ROWS:-1000}
      QUERY_TIMEOUT: ${QUERY_TIMEOUT:-30}
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - app_logs:/app/logs
    networks:
      - sql-analytics-net

volumes:
  mysql_data:
  app_logs:

networks:
  sql-analytics-net:
    driver: bridge
